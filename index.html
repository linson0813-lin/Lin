<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>英翻中工具</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink: #1a1a2e;
      --paper: #f7f5f0;
      --panel: #ffffff;
      --accent: #c0392b;
      --accent-light: #f9ece9;
      --border: #e0ddd6;
      --muted: #8a8580;
      --success: #27ae60;
      --radius: 10px;
    }

    html, body {
      height: 100%;
    }

    body {
      font-family: 'Inter', 'Noto Serif TC', sans-serif;
      background: var(--paper);
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Header */
    header {
      background: var(--ink);
      color: #fff;
      padding: 18px 32px;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .header-icon {
      width: 38px;
      height: 38px;
      background: var(--accent);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    .header-text h1 {
      font-family: 'Noto Serif TC', serif;
      font-size: 1.2rem;
      font-weight: 600;
      letter-spacing: 0.04em;
    }

    .header-text p {
      font-size: 0.72rem;
      color: #aaa;
      margin-top: 2px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    /* Main layout */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 0;
      padding: 28px 32px 40px;
      max-width: 960px;
      width: 100%;
      margin: 0 auto;
    }

    /* Language labels row */
    .lang-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
    }

    .lang-badge {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      background: var(--border);
      padding: 3px 10px;
      border-radius: 20px;
    }

    .lang-badge.active {
      background: var(--accent-light);
      color: var(--accent);
    }

    .lang-arrow {
      font-size: 0.9rem;
      color: var(--muted);
    }

    /* Panels */
    .panels {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      align-items: start;
    }

    .panel {
      background: var(--panel);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: border-color 0.2s;
    }

    .panel:focus-within {
      border-color: var(--accent);
    }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      background: #fafaf8;
    }

    .panel-label {
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .panel-actions {
      display: flex;
      gap: 6px;
    }

    .icon-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      cursor: pointer;
      padding: 4px 8px;
      font-size: 0.7rem;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 4px;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }

    .icon-btn:hover {
      background: var(--accent-light);
      color: var(--accent);
      border-color: var(--accent);
    }

    .icon-btn:active {
      transform: scale(0.97);
    }

    .icon-btn.copied {
      background: #e8f8ef;
      color: var(--success);
      border-color: var(--success);
    }

    textarea {
      width: 100%;
      border: none;
      outline: none;
      resize: none;
      font-family: 'Inter', sans-serif;
      font-size: 1rem;
      line-height: 1.7;
      color: var(--ink);
      background: transparent;
      padding: 16px;
      min-height: 220px;
      caret-color: var(--accent);
    }

    textarea::placeholder {
      color: #c0bdb7;
    }

    .output-text {
      padding: 16px;
      min-height: 220px;
      font-family: 'Noto Serif TC', serif;
      font-size: 1rem;
      line-height: 1.9;
      color: var(--ink);
      white-space: pre-wrap;
      word-break: break-word;
    }

    .output-text.empty {
      color: #c0bdb7;
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
    }

    .output-text.loading {
      color: var(--muted);
      font-family: 'Inter', sans-serif;
    }

    /* Loading dots */
    .dots::after {
      content: '';
      animation: dots 1.2s infinite;
    }

    @keyframes dots {
      0%   { content: ''; }
      25%  { content: '.'; }
      50%  { content: '..'; }
      75%  { content: '...'; }
    }

    /* Translate button */
    .action-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin: 18px 0 6px;
    }

    .translate-btn {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      padding: 12px 36px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.04em;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 2px 8px rgba(192,57,43,0.15);
    }

    .translate-btn:hover:not(:disabled) {
      background: #a93226;
      box-shadow: 0 4px 16px rgba(192,57,43,0.25);
      transform: translateY(-1px);
    }

    .translate-btn:active:not(:disabled) {
      transform: translateY(0);
      box-shadow: none;
    }

    .translate-btn:disabled {
      background: #d5cfc8;
      cursor: not-allowed;
      box-shadow: none;
    }

    .clear-btn {
      background: none;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 11px 18px;
      font-size: 0.85rem;
      color: var(--muted);
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }

    .clear-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    /* Char count */
    .char-count {
      font-size: 0.68rem;
      color: var(--muted);
      text-align: right;
      padding: 0 14px 8px;
    }

    /* Error */
    .error-box {
      background: #fdf0ef;
      border: 1px solid #e8a39d;
      border-radius: var(--radius);
      padding: 12px 16px;
      font-size: 0.85rem;
      color: var(--accent);
      margin-top: 10px;
      display: none;
    }

    .error-box.visible {
      display: block;
    }

    /* Footer */
    footer {
      text-align: center;
      padding: 12px;
      font-size: 0.7rem;
      color: #bbb;
      letter-spacing: 0.05em;
    }

    /* Responsive */
    @media (max-width: 680px) {
      main {
        padding: 16px;
      }

      .panels {
        grid-template-columns: 1fr;
      }

      header {
        padding: 14px 16px;
      }
    }
  </style>
</head>
<body>

<header>
  <div class="header-icon">🔤</div>
  <div class="header-text">
    <h1>英翻中翻譯工具</h1>
    <p>English → 繁體中文 · Powered by Claude</p>
  </div>
</header>

<main>
  <div class="lang-row">
    <span class="lang-badge active">English</span>
    <span class="lang-arrow">→</span>
    <span class="lang-badge">繁體中文</span>
  </div>

  <div class="panels">
    <!-- Input -->
    <div class="panel" id="inputPanel">
      <div class="panel-header">
        <span class="panel-label">輸入英文</span>
        <div class="panel-actions">
          <button class="icon-btn" id="pasteBtn" title="貼上剪貼簿">📋 貼上</button>
        </div>
      </div>
      <textarea
        id="inputText"
        placeholder="在此輸入英文文字..."
        maxlength="5000"
        spellcheck="true"
      ></textarea>
      <div class="char-count"><span id="charCount">0</span> / 5000</div>
    </div>

    <!-- Output -->
    <div class="panel" id="outputPanel">
      <div class="panel-header">
        <span class="panel-label">翻譯結果</span>
        <div class="panel-actions">
          <button class="icon-btn" id="copyBtn" title="複製翻譯結果">📄 複製</button>
        </div>
      </div>
      <div class="output-text empty" id="outputText">翻譯結果將顯示於此…</div>
    </div>
  </div>

  <div class="action-row">
    <button class="clear-btn" id="clearBtn">清除</button>
    <button class="translate-btn" id="translateBtn">
      <span>翻譯</span>
      <span>→</span>
    </button>
  </div>

  <div class="error-box" id="errorBox"></div>
</main>

<footer>© 2026 英翻中工具 · 翻譯結果由 AI 生成，僅供參考</footer>

<script>
  const inputText   = document.getElementById('inputText');
  const outputText  = document.getElementById('outputText');
  const translateBtn = document.getElementById('translateBtn');
  const clearBtn    = document.getElementById('clearBtn');
  const copyBtn     = document.getElementById('copyBtn');
  const pasteBtn    = document.getElementById('pasteBtn');
  const charCount   = document.getElementById('charCount');
  const errorBox    = document.getElementById('errorBox');

  let lastResult = '';
  let isLoading  = false;

  // Char counter
  inputText.addEventListener('input', () => {
    charCount.textContent = inputText.value.length;
  });

  // Paste button
  pasteBtn.addEventListener('click', async () => {
    try {
      const text = await navigator.clipboard.readText();
      inputText.value = text;
      charCount.textContent = text.length;
      inputText.focus();
    } catch {
      inputText.focus();
    }
  });

  // Copy button
  copyBtn.addEventListener('click', async () => {
    if (!lastResult) return;
    try {
      await navigator.clipboard.writeText(lastResult);
      copyBtn.textContent = '✅ 已複製';
      copyBtn.classList.add('copied');
      setTimeout(() => {
        copyBtn.innerHTML = '📄 複製';
        copyBtn.classList.remove('copied');
      }, 2000);
    } catch {
      // silent fail
    }
  });

  // Clear
  clearBtn.addEventListener('click', () => {
    inputText.value = '';
    charCount.textContent = '0';
    outputText.textContent = '翻譯結果將顯示於此…';
    outputText.className = 'output-text empty';
    lastResult = '';
    hideError();
    inputText.focus();
  });

  // Translate on Enter (Ctrl/Cmd+Enter)
  inputText.addEventListener('keydown', (e) => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
      e.preventDefault();
      doTranslate();
    }
  });

  translateBtn.addEventListener('click', doTranslate);

  function showError(msg) {
    errorBox.textContent = msg;
    errorBox.classList.add('visible');
  }

  function hideError() {
    errorBox.classList.remove('visible');
    errorBox.textContent = '';
  }

  function setLoading(val) {
    isLoading = val;
    translateBtn.disabled = val;
    if (val) {
      outputText.className = 'output-text loading';
      outputText.innerHTML = '<span class="dots">翻譯中</span>';
    }
  }

  async function doTranslate() {
    if (isLoading) return;
    const text = inputText.value.trim();
    if (!text) {
      showError('請先輸入英文文字。');
      inputText.focus();
      return;
    }
    hideError();
    setLoading(true);

    try {
      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
        },
        body: JSON.stringify({
          model: 'claude-sonnet-4-6',
          max_tokens: 1000,
          system: `你是一位專業翻譯員，專精於英文翻譯成繁體中文。
請將使用者輸入的英文內容翻譯成自然流暢的繁體中文。
規則：
- 只輸出翻譯結果，不要加任何解釋、前言或後記
- 保持原文的語氣與格式（段落、條列等）
- 若有專有名詞，適當保留原文或加上括號標注
- 翻譯結果使用台灣慣用的繁體中文用語`,
          messages: [
            { role: 'user', content: text }
          ]
        })
      });

      if (!response.ok) {
        const err = await response.json().catch(() => ({}));
        throw new Error(err?.error?.message || `HTTP ${response.status}`);
      }

      const data = await response.json();
      const result = data.content
        .filter(b => b.type === 'text')
        .map(b => b.text)
        .join('');

      lastResult = result;
      outputText.textContent = result;
      outputText.className = 'output-text';

    } catch (err) {
      outputText.textContent = '翻譯結果將顯示於此…';
      outputText.className = 'output-text empty';
      showError('翻譯失敗：' + (err.message || '未知錯誤，請稍後再試。'));
    } finally {
      setLoading(false);
    }
  }
</script>
</body>
</html>
